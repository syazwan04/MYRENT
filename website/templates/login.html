{% extends "base.html" %}{# This template will be exactly the same as base.html #}
                         {# Can be override block inside base.html #}
{% block title %}Login{% endblock %}

{% block content %}
<form method="POST">{# to give signal POST to backend#} 
    <h3 align="center">Log In</h3>
    <div class="form-group">

        <label for="email">Email Address</label>
        <input 
        type="email" 
        class="form-control"
        id="email"
        name="email"
        placeholder="Enter email"

    </div>
    <div class="form-group">

        <label for="password">Password</label>
        <input 
        type="password" 
        class="form-control"
        id="password"
        name="password"
        placeholder="Enter password"
        
    </div>

    <br/>
    <button type="submit" class="btn btn-primary">Login</button>
</form>

{% endblock %}
